  <rect x="28" y="46" width="12" height="6" rx="2" fill="#D9486E" stroke="#2B1A0F" stroke-width="1" transform="rotate(25,34,49)"/>
  <rect x="195" y="44" width="10" height="5" rx="2" fill="#5DA53C" stroke="#2B1A0F" stroke-width="1" transform="rotate(70,200,47)"/>
  <rect x="198" y="65" width="12" height="6" rx="2" fill="#D9486E" stroke="#2B1A0F" stroke-width="1" transform="rotate(40,204,68)"/>
