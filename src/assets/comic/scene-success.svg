<svg viewBox="0 0 240 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- SuccessScene — standalone SVG export for website reuse. -->
  <!-- Comic Testival style: bold outlines, flat cel shadows, saturated palette. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7FA8E8"/>
      <stop offset="100%" stop-color="#FFE9B8"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8A000"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E8A000"/>
    </linearGradient>
  </defs>
  <rect width="240" height="200" rx="16" fill="url(#sky)"/>
  <!-- ground -->
  <path d="M0 168 Q60 158 120 165 Q180 172 240 162 L240 200 L0 200 Z" fill="#5DA53C"/>
  <path d="M0 182 Q60 172 120 179 Q180 186 240 176 L240 200 L0 200 Z" fill="#2E6B3E"/>
