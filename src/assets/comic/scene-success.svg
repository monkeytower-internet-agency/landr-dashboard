  <line x1="120" y1="68" x2="120" y2="20" stroke="#F7B32B" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="148" y1="76" x2="162" y2="34" stroke="#F7B32B" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="168" y1="96" x2="210" y2="72" stroke="#F7B32B" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="172" y1="122" x2="218" y2="122" stroke="#F7B32B" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="92" y1="76" x2="78" y2="34" stroke="#F7B32B" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="72" y1="96" x2="30" y2="72" stroke="#F7B32B" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="68" y1="122" x2="22" y2="122" stroke="#F7B32B" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- trophy -->
  <rect x="98" y="153" width="44" height="8" rx="4" fill="url(#trophy)" stroke="#2B1A0F" stroke-width="2.5"/>
  <rect x="88" y="158" width="64" height="10" rx="5" fill="url(#trophy)" stroke="#2B1A0F" stroke-width="2.5"/>
  <rect x="112" y="138" width="16" height="20" rx="4" fill="url(#trophy)" stroke="#2B1A0F" stroke-width="2.5"/>
  <path d="M72 72 Q68 115 88 135 Q100 145 120 145 Q140 145 152 135 Q172 115 168 72 Z" fill="url(#trophy)" stroke="#2B1A0F" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M80 80 Q78 110 92 130 Q104 140 120 140" fill="none" stroke="#C87A00" stroke-width="6" opacity="0.35" stroke-linecap="round"/>
  <path d="M72 80 Q52 80 52 100 Q52 120 72 118" fill="none" stroke="url(#trophy)" stroke-width="12" stroke-linecap="round"/>
  <path d="M72 80 Q52 80 52 100 Q52 120 72 118" fill="none" stroke="#2B1A0F" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M168 80 Q188 80 188 100 Q188 120 168 118" fill="none" stroke="url(#trophy)" stroke-width="12" stroke-linecap="round"/>
  <path d="M168 80 Q188 80 188 100 Q188 120 168 118" fill="none" stroke="#2B1A0F" stroke-width="2.5" stroke-linecap="round"/>
