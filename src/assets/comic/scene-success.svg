  <polygon points="42,46 44.8,53.5 51.4,53.5 46.2,59 48.2,66.5 42,62.3 35.8,66.5 37.8,59 32.6,53.5 39.2,53.5" fill="#F7B32B" stroke="#2B1A0F" stroke-width="1.5"/>
