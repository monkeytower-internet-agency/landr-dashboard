<svg viewBox="0 0 200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot — thinking pose. Style: Comic Testival. -->
  <!-- harness -->
  <path d="M140 165 Q160 170 162 200 Q160 225 145 230 L142 230 L142 165 Z" fill="#5DA53C" stroke="#2B1A0F" stroke-width="2" stroke-linejoin="round"/>
  <!-- body -->
  <path d="M60 155 Q55 210 58 240 L142 240 Q145 210 140 155 Z" fill="#C4502A" stroke="#2B1A0F" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M70 160 Q67 195 68 225 L88 225 Q87 195 88 160 Z" fill="#8B3118" opacity="0.6"/>
  <!-- left arm folded -->
  <path d="M62 168 Q72 185 105 188" stroke="#E8A87C" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M62 168 Q72 185 105 188" stroke="#2B1A0F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="108" cy="189" rx="10" ry="8" fill="#E8A87C" stroke="#2B1A0F" stroke-width="2"/>
  <!-- right arm raised to chin -->
  <path d="M138 168 Q148 155 138 140" stroke="#E8A87C" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M138 168 Q148 155 138 140" stroke="#2B1A0F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="132" cy="136" rx="10" ry="8" fill="#E8A87C" stroke="#2B1A0F" stroke-width="2"/>
  <path d="M128 130 Q126 121 128 116" stroke="#E8A87C" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M128 130 Q126 121 128 116" stroke="#2B1A0F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- legs -->
  <path d="M80 240 Q78 265 78 288" stroke="#2B4A7A" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M80 240 Q78 265 78 288" stroke="#2B1A0F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M120 240 Q122 265 122 288" stroke="#2B4A7A" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M120 240 Q122 265 122 288" stroke="#2B1A0F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="78" cy="292" rx="14" ry="8" fill="#2B1A0F"/>
  <ellipse cx="122" cy="292" rx="14" ry="8" fill="#2B1A0F"/>
  <!-- head -->
  <ellipse cx="100" cy="110" rx="42" ry="40" fill="#E8A87C" stroke="#2B1A0F" stroke-width="2.5"/>
  <!-- cap -->
  <path d="M60 98 Q62 82 100 78 Q138 82 140 98 L138 102 Q100 92 62 102 Z" fill="#4A7BD0" stroke="#2B1A0F" stroke-width="2.5"/>
  <path d="M56 105 Q58 95 100 92 Q100 108 58 108 Z" fill="#3A6AC0" stroke="#2B1A0F" stroke-width="2"/>
  <rect x="88" y="81" width="24" height="12" rx="3" fill="#1A3A7A" stroke="#2B1A0F" stroke-width="1.5"/>
  <!-- hair -->
  <path d="M60 105 Q64 118 68 120" stroke="#F7B32B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M140 105 Q136 118 132 120" stroke="#F7B32B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- ears -->
  <ellipse cx="58" cy="112" rx="7" ry="9" fill="#E8A87C" stroke="#2B1A0F" stroke-width="2"/>
  <ellipse cx="142" cy="112" rx="7" ry="9" fill="#E8A87C" stroke="#2B1A0F" stroke-width="2"/>
  <!-- glasses -->
  <rect x="68" y="108" width="26" height="19" rx="7" fill="#B8D4F0" stroke="#2B1A0F" stroke-width="3"/>
  <rect x="106" y="108" width="26" height="19" rx="7" fill="#B8D4F0" stroke="#2B1A0F" stroke-width="3"/>
  <line x1="94" y1="116" x2="106" y2="116" stroke="#2B1A0F" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="76" cy="112" rx="4" ry="3" fill="white" opacity="0.5"/>
  <ellipse cx="114" cy="112" rx="4" ry="3" fill="white" opacity="0.5"/>
  <!-- eyes -->
  <ellipse cx="81" cy="117" rx="7" ry="7" fill="white"/>
  <circle cx="83" cy="118" r="4.5" fill="#2B1A0F"/>
  <circle cx="84.5" cy="116.5" r="1.5" fill="white"/>
  <ellipse cx="119" cy="117" rx="7" ry="7" fill="white"/>
  <circle cx="121" cy="118" r="4.5" fill="#2B1A0F"/>
  <circle cx="122.5" cy="116.5" r="1.5" fill="white"/>
  <!-- eyebrows (asymmetric — thinking) -->
  <path d="M70 108 Q81 105 89 107" fill="none" stroke="#2B1A0F" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M111 106 Q119 104 130 108" fill="none" stroke="#2B1A0F" stroke-width="2.5" stroke-linecap="round"/>
  <!-- blush -->
  <ellipse cx="68" cy="126" rx="8" ry="5" fill="#D9486E" opacity="0.3"/>
  <ellipse cx="132" cy="126" rx="8" ry="5" fill="#D9486E" opacity="0.3"/>
  <!-- neutral mouth -->
  <path d="M85 133 Q100 138 115 133" fill="none" stroke="#2B1A0F" stroke-width="2.5" stroke-linecap="round"/>
  <!-- thought bubble -->
  <circle cx="168" cy="80" r="14" fill="#FFF6E3" stroke="#2B1A0F" stroke-width="2"/>
  <circle cx="158" cy="95" r="8" fill="#FFF6E3" stroke="#2B1A0F" stroke-width="2"/>
  <circle cx="150" cy="108" r="5" fill="#FFF6E3" stroke="#2B1A0F" stroke-width="2"/>
  <!-- tiny glider in thought bubble -->
  <path d="M161,78 Q168,72 175,78 L174,81 Q168,75 162,81 Z" fill="#C4502A" stroke="#2B1A0F" stroke-width="1.5"/>
  <!-- sparkle dots -->
  <circle cx="145" cy="72" r="3" fill="#F7B32B"/>
  <circle cx="152" cy="65" r="2" fill="#F7B32B"/>
  <circle cx="160" cy="60" r="1.5" fill="#F7B32B"/>
</svg>
