  <path d="M70 160 Q67 195 68 225 L88 225 Q87 195 88 160 Z" fill="#8B3118" opacity="0.6"/>
  <!-- left arm shrug -->
  <path d="M62 168 Q38 172 30 160" stroke="#E8A87C" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M62 168 Q38 172 30 160" stroke="#2B1A0F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="27" cy="157" rx="10" ry="9" fill="#E8A87C" stroke="#2B1A0F" stroke-width="2"/>
  <!-- right arm shrug -->
  <path d="M138 168 Q162 172 170 160" stroke="#E8A87C" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M138 168 Q162 172 170 160" stroke="#2B1A0F" stroke-width="2" fill="none" stroke-linecap="round"/>
