name: Deploy dashboard to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  PAGES_PROJECT_NAME: landr-dashboard

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'push' && 'production' || 'preview' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - name: Build (production)
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://supabase.magrathea.dalm.de' }}
          VITE_SUPABASE_PUB_KEY: ${{ secrets.VITE_SUPABASE_PUB_KEY }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.landr.de' }}
        run: npm run build

      - name: Ensure Cloudflare Pages project exists (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@3 pages project create "${{ env.PAGES_PROJECT_NAME }}" \
            --production-branch=main 2>&1 | tee /tmp/pages-create.log \
            || grep -qi "already exists" /tmp/pages-create.log

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy dist
            --project-name=${{ env.PAGES_PROJECT_NAME }}
            --branch=${{ github.head_ref || github.ref_name }}
