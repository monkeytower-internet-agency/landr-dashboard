name: Bind custom domain to Pages project

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Custom domain to bind'
        required: true
        default: 'dashboard.landr.de'

jobs:
  bind-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Bind custom domain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@3 pages domain add landr-dashboard "${{ github.event.inputs.domain }}"
