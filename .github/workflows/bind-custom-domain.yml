name: Bind custom domain to Pages project

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Custom domain to bind'
        required: true
        default: 'dashboard.landr.de'

jobs:
  bind-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Bind custom domain via CF API
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/landr-dashboard/domains" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"${{ github.event.inputs.domain }}\"}")
          echo "$RESPONSE" | python3 -m json.tool
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('success') else 1)"
